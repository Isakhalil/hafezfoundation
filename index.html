<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circle-style Login</title>

  <!-- Inter font (similar to their default sans) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      /* ==== core palette from your tokens (simplified) ==== */
      --coaw-blue-color: 48 59 107;
      --coaw-red-color: 129 38 35;
      --coaw-secondary-color: 226 220 198;
      --coaw-secondary-light-color: 245 240 220;
      --coaw-primary-color: var(--coaw-blue-color);
      --coaw-page-bg: 250 248 241;
      --coaw-surface-1: 255 255 255;
      --coaw-surface-2: 247 244 236;
      --coaw-border-soft: 48 59 107;
      --coaw-border-strong: 34 45 92;
      --coaw-text-body: 44 50 68;
      --coaw-text-muted: 66 76 117;
      --coaw-accent-soft: 230 199 141;

      --background: rgb(var(--coaw-page-bg));
      --foreground: rgb(var(--coaw-primary-color));

      --spacing: 0.25rem;
      --container-md: 28rem;

      --text-xs: 0.75rem;
      --text-sm: 0.875rem;
      --text-base: 1rem;
      --text-lg: 1.125rem;
      --text-xl: 1.25rem;
      --text-2xl: 1.5rem;
      --text-3xl: 1.875rem;

      --font-weight-normal: 400;
      --font-weight-medium: 500;
      --font-weight-semibold: 600;
      --font-weight-bold: 700;

      --radius-md: 0.375rem;
      --radius-lg: 0.5rem;
      --radius-xl: 0.75rem;
      --radius-2xl: 1rem;

      --default-font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;

      --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: var(--default-font-family);
      background: radial-gradient(circle at top, #fdfaf4 0%, var(--background) 60%);
      color: rgb(var(--coaw-text-body));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .page-wrap {
      width: 100%;
      max-width: var(--container-md);
    }

    .login-card {
      background: rgb(var(--coaw-surface-1));
      border-radius: 1.25rem;
      border: 1px solid rgba(var(--coaw-border-soft), 0.35);
      box-shadow: var(--shadow-soft);
      padding: 2.25rem 2rem 2rem;
    }

    .eyebrow {
      font-size: var(--text-xs);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgb(var(--coaw-text-muted));
      text-align: center;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: 2rem;
      line-height: 1.1;
      text-align: center;
      margin-bottom: 0.75rem;
      font-weight: var(--font-weight-bold);
      color: rgb(var(--coaw-text-body));
    }

    .subtext {
      font-size: var(--text-sm);
      line-height: 1.5;
      text-align: center;
      color: rgb(var(--coaw-text-muted));
      max-width: 30rem;
      margin: 0 auto 1.75rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: var(--text-sm);
      font-weight: var(--font-weight-medium);
      color: rgb(var(--coaw-text-body));
      margin-bottom: 0.5rem;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      border-radius: 0.75rem;
      border: 1px solid rgba(var(--coaw-border-soft), 0.35);
      padding: 0.875rem 0.875rem;
      font-size: var(--text-base);
      background: #fff;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: rgb(var(--coaw-border-strong));
      box-shadow: 0 0 0 3px rgba(var(--coaw-border-strong), 0.18);
      background: rgb(var(--coaw-surface-2));
    }

    .forgot-link {
      display: inline-block;
      margin: 0.35rem 0 1.4rem;
      font-size: var(--text-xs);
      color: rgb(var(--coaw-text-muted));
      text-decoration: none;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .login-button {
      width: 100%;
      border-radius: 999px;
      border: none;
      padding: 0.9rem 1rem;
      font-size: var(--text-base);
      font-weight: var(--font-weight-semibold);
      background: rgb(var(--coaw-primary-color));
      color: #fff;
      cursor: pointer;
      transition: transform 0.06s ease, box-shadow 0.12s ease, background 0.15s ease;
      box-shadow: 0 10px 25px rgba(var(--coaw-primary-color), 0.4);
    }

    .login-button:hover {
      background: rgba(var(--coaw-primary-color), 0.95);
    }

    .login-button:active {
      transform: translateY(1px);
      box-shadow: 0 6px 18px rgba(var(--coaw-primary-color), 0.45);
    }

    .message {
      min-height: 1.25rem;
      text-align: center;
      font-size: var(--text-sm);
      margin-top: 0.85rem;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.75rem 0 1.1rem;
      font-size: var(--text-xs);
      color: rgb(var(--coaw-text-muted));
      text-transform: uppercase;
      letter-spacing: 0.18em;
      justify-content: center;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(var(--coaw-border-soft), 0.35);
    }

    .secondary-link {
      display: block;
      text-align: center;
      text-decoration: none;
      padding: 0.9rem 1rem;
      border-radius: 0.9rem;
      background: rgb(var(--coaw-secondary-light-color));
      border: 1px solid rgba(var(--coaw-border-soft), 0.35);
      color: rgb(var(--coaw-text-body));
      font-size: var(--text-sm);
      font-weight: var(--font-weight-semibold);
      transition: background 0.15s ease, transform 0.06s ease, box-shadow 0.12s ease;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
    }

    .secondary-link:hover {
      background: rgb(var(--coaw-secondary-color));
    }

    .secondary-link:active {
      transform: translateY(1px);
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.08);
    }

    .footer-note {
      text-align: center;
      margin-top: 1.25rem;
      font-size: var(--text-xs);
      color: rgb(var(--coaw-text-muted));
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 2rem 1.5rem 1.75rem;
      }

      h1 {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="login-card">
      <div class="eyebrow">Member Access</div>
      <h1>Welcome Back</h1>
      <p class="subtext">
        Sign in to access the private AI space. Existing members can use the same email and password.
      </p>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email address</label>
          <input id="email" type="email" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" required />
        </div>

        <a href="#" class="forgot-link">Forgot your password?</a>

        <button type="submit" class="login-button">Sign In</button>
        <div class="message" id="message"></div>
      </form>

      <div class="divider">or</div>

      <a
        class="secondary-link"
        href="https://circleofabidingwisdom.org/login"
        target="_blank"
        rel="noopener noreferrer"
      >
        Register with Circle of Abiding Wisdom
      </a>

      <div class="footer-note">
        Private login for your community’s AI companion
      </div>
    </div>
  </div>

  <script>
    // Simple demo users – ONLY for preview, not real security
    const users = [
      { email: "hafez", password: "1234" },
      { email: "friend@gmail.com", password: "wisdom2026" },
    ];

    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;

      const match = users.find(
        (u) => u.email.toLowerCase() === email && u.password === password
      );

      if (match) {
        message.style.color = "rgb(52, 120, 72)";
        message.textContent = "Login successful. (Next: send them to your AI page.)";
        // later: window.location.href = "dashboard.html";
      } else {
        message.style.color = "rgb(129, 38, 35)";
        message.textContent = "Invalid email or password.";
      }
    });
  </script>
</body>
</html>
