<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member Login</title>
  <style>
    :root {
      --bg: #f5f1ea;
      --card: #ffffff;
      --text: #1e1e1e;
      --muted: #6f6a63;
      --border: #ded6cb;
      --primary: #222222;
      --primary-hover: #111111;
      --soft: #f2ece3;
      --soft-border: #d7cdc0;
      --success: #246b3b;
      --error: #8c2e2e;
      --shadow: 0 18px 45px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top, #fbf8f3 0%, var(--bg) 55%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 34px 28px 26px;
    }

    .eyebrow {
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 32px;
      line-height: 1.1;
      font-weight: 700;
    }

    .subtext {
      margin: 0 0 26px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 14px;
      font-size: 16px;
      background: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: #9b9389;
      box-shadow: 0 0 0 4px rgba(80, 70, 55, 0.08);
    }

    .forgot {
      display: inline-block;
      margin: 4px 0 18px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    .signin-btn {
      width: 100%;
      border: none;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      padding: 15px 18px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.05s ease;
    }

    .signin-btn:hover {
      background: var(--primary-hover);
    }

    .signin-btn:active {
      transform: translateY(1px);
    }

    .message {
      min-height: 22px;
      text-align: center;
      margin-top: 14px;
      font-size: 14px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .register-link {
      display: block;
      text-align: center;
      text-decoration: none;
      padding: 14px 16px;
      border-radius: 14px;
      background: var(--soft);
      border: 1px solid var(--soft-border);
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      transition: background 0.2s ease;
    }

    .register-link:hover {
      background: #ece3d6;
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .card {
        padding: 28px 20px 22px;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="eyebrow">Member Access</div>
      <h1>Welcome Back</h1>
      <p class="subtext">
        Our platform has a new home. Your existing credentials will work here.
      </p>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email Address</label>
          <input id="email" type="email" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" required />
        </div>

        <a class="forgot" href="#">Forgot your password?</a>

        <button type="submit" class="signin-btn">Sign In</button>
        <div class="message" id="message"></div>
      </form>

      <div class="divider">or</div>

      <a
        class="register-link"
        href="https://circleofabidingwisdom.org/login"
        target="_blank"
        rel="noopener noreferrer"
      >
        Register with Circle of Abiding Wisdom
      </a>

      <div class="footer">
        Private group login portal
      </div>
    </div>
  </div>

  <script>
    const users = [
      { email: "you@example.com", password: "test1234" },
      { email: "friend@example.com", password: "wisdom2026" }
    ];

    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;
      const message = document.getElementById("message");

      const match = users.find(
        user => user.email.toLowerCase() === email && user.password === password
      );

      if (match) {
        message.style.color = "#246b3b";
        message.textContent = "Login successful. Redirecting...";
      } else {
        message.style.color = "#8c2e2e";
        message.textContent = "Invalid email or password.";
      }
    });
  </script>
</body>
</html>
